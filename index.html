<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: white; }
        .hidden { display: none !important; }
        
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        
        .login { display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .login-box h1 { color: #f97316; font-size: 28px; margin-bottom: 8px; }
        .login-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
        
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: linear-gradient(135deg, #f97316, #fbbf24); color: white; border: none; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
        
        .header { background: linear-gradient(135deg, #f97316, #fbbf24); color: white; padding: 16px; text-align: center; margin: -20px -20px 20px -20px; }
        .header h1 { font-size: 22px; margin: 0; }
        
        .btn-group { margin-top: 20px; }
        .btn-menu { width: 100%; padding: 14px; margin: 8px 0; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-add { background: linear-gradient(135deg, #22c55e, #10b981); }
        .btn-view { background: linear-gradient(135deg, #3b82f6, #0ea5e9); }
        .btn-logout { background: #ef4444; }
        
        .row { background: #f9fafb; padding: 12px; border-radius: 6px; margin: 12px 0; border: 1px solid #e5e7eb; }
        .row-title { font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
        
        .total-box { background: #f0fdf4; border: 2px solid #22c55e; padding: 12px; border-radius: 6px; text-align: center; margin: 16px 0; }
        .total-box h2 { color: #22c55e; font-size: 20px; }
        
        .list-item { background: #f9fafb; padding: 12px; border-radius: 6px; margin: 8px 0; border-left: 4px solid #f97316; }
        .list-item p { font-size: 12px; color: #666; margin: 4px 0; }
        
        .success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="screen login active" id="loginScreen">
        <div class="login-box">
            <h1>Project</h1>
            <p>Expense Tracker</p>
            <select id="userEmail" style="margin: 16px 0;">
                <option value="">Select Email...</option>
                <option value="jdghevariya@gmail.com">Jagdish</option>
                <option value="31.shrikant@gmail.com">Shrikant</option>
                <option value="spprince34@gmail.com">Prince</option>
                <option value="rathodkishan30055@gmail.com">Kishan</option>
                <option value="sarvayogamgroup@gmail.com">Admin</option>
            </select>
            <button onclick="doLogin()">Login</button>
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div class="screen" id="homeScreen">
        <div class="header">
            <h1>Expense Tracker</h1>
            <p id="userName" style="margin: 4px 0; font-size: 12px;"></p>
        </div>
        <div style="max-width: 500px; margin: 0 auto;">
            <button class="btn-menu btn-add" onclick="showScreen('addScreen')">➕ Add Expense</button>
            <button class="btn-menu btn-view" onclick="showScreen('viewScreen')">👁️ View All</button>
            <button class="btn-menu btn-logout" onclick="doLogout()">🚪 Logout</button>
        </div>
    </div>

    <!-- ADD SCREEN -->
    <div class="screen" id="addScreen">
        <div class="header"><h1>Add Expense</h1></div>
        <div style="max-width: 500px; margin: 0 auto;">
            <div id="successMsg"></div>
            <div class="total-box">
                <p style="margin: 0; font-size: 12px; color: #666;">Running Total</p>
                <h2 id="runningTotal" style="margin: 0;">₹0</h2>
            </div>
            <div id="rowsContainer"></div>
            <button onclick="addNewRow()" style="background: #fef3c7; color: #92400e; margin-top: 12px;">+ Add Row</button>
            <button onclick="saveAllExpenses()" style="background: #22c55e; margin-top: 8px;">✓ Save All</button>
            <button onclick="showScreen('homeScreen')" style="background: #6b7280;">Back</button>
        </div>
    </div>

    <!-- VIEW SCREEN -->
    <div class="screen" id="viewScreen">
        <div class="header"><h1>All Expenses</h1></div>
        <div style="max-width: 500px; margin: 0 auto;">
            <div id="expensesList"></div>
            <button onclick="showScreen('homeScreen')" style="background: #6b7280; margin-top: 16px;">Back</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let expenses = [];
        let rowCount = 0;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'viewScreen') showExpenses();
            if (screenId === 'addScreen') renderRows();
        }

        function doLogin() {
            const email = document.getElementById('userEmail').value;
            if (!email) {
                alert('Please select an email');
                return;
            }
            currentUser = email;
            document.getElementById('userName').textContent = email.split('@')[0];
            loadExpenses();
            showScreen('homeScreen');
        }

        function doLogout() {
            currentUser = null;
            expenses = [];
            document.getElementById('userEmail').value = '';
            showScreen('loginScreen');
        }

        function loadExpenses() {
            const data = localStorage.getItem('expenseData');
            expenses = data ? JSON.parse(data) : [];
        }

        function addNewRow() {
            expenses.push({
                id: rowCount++,
                project: '',
                date: '',
                particular: '',
                unit: '',
                qty: 1,
                rate: 0,
                gst: 0,
                entity: '',
                notes: ''
            });
            renderRows();
        }

        function deleteRow(id) {
            expenses = expenses.filter(r => r.id !== id);
            renderRows();
        }

        function updateField(id, field, value) {
            const row = expenses.find(r => r.id === id);
            if (row) row[field] = value;
            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('rowsContainer');
            container.innerHTML = '';

            if (!expenses.length) {
                addNewRow();
                return;
            }

            let total = 0;

            expenses.forEach(row => {
                const qty = parseFloat(row.qty) || 0;
                const rate = parseFloat(row.rate) || 0;
                const gst = parseFloat(row.gst) || 0;
                const amount = qty * rate;
                const gstAmount = (amount * gst) / 100;
                const rowTotal = amount + gstAmount;
                total += rowTotal;

                const html = `
                    <div class="row">
                        <div class="row-title">
                            <span>Expense ${expenses.indexOf(row) + 1}</span>
                            ${expenses.length > 1 ? `<button onclick="deleteRow(${row.id})" style="width: auto; background: #ef4444; padding: 4px 8px; font-size: 12px;">Delete</button>` : ''}
                        </div>
                        <input type="text" placeholder="Project (e.g., Surat_001)" value="${row.project}" onchange="updateField(${row.id}, 'project', this.value)">
                        <input type="date" value="${row.date}" onchange="updateField(${row.id}, 'date', this.value)">
                        <input type="text" placeholder="Particular (Panel, Labor, etc)" value="${row.particular}" onchange="updateField(${row.id}, 'particular', this.value)">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <input type="text" placeholder="Unit" value="${row.unit}" onchange="updateField(${row.id}, 'unit', this.value)">
                            <input type="number" placeholder="Qty" value="${row.qty}" onchange="updateField(${row.id}, 'qty', this.value)">
                        </div>
                        <input type="number" placeholder="Rate (₹)" value="${row.rate}" onchange="updateField(${row.id}, 'rate', this.value)">
                        <div style="background: #eff6ff; padding: 8px; border-radius: 4px; text-align: center; font-size: 13px;">
                            <p style="margin: 0; color: #666; font-size: 11px;">Amount: <strong style="color: #1e40af;">₹${amount.toLocaleString('en-IN')}</strong></p>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <select onchange="updateField(${row.id}, 'gst', this.value)">
                                <option value="0" ${row.gst == 0 ? 'selected' : ''}>GST: 0%</option>
                                <option value="5" ${row.gst == 5 ? 'selected' : ''}>GST: 5%</option>
                                <option value="18" ${row.gst == 18 ? 'selected' : ''}>GST: 18%</option>
                            </select>
                            <select onchange="updateField(${row.id}, 'entity', this.value)">
                                <option value="">Entity</option>
                                <option ${row.entity === 'Prince' ? 'selected' : ''}>Prince</option>
                                <option ${row.entity === 'Kishan' ? 'selected' : ''}>Kishan</option>
                                <option ${row.entity === 'Jagdish' ? 'selected' : ''}>Jagdish</option>
                                <option ${row.entity === 'Shrikant' ? 'selected' : ''}>Shrikant</option>
                                <option ${row.entity === 'SSPL' ? 'selected' : ''}>SSPL</option>
                                <option ${row.entity === 'SRS' ? 'selected' : ''}>SRS</option>
                            </select>
                        </div>
                        <input type="text" placeholder="Notes (optional)" value="${row.notes}" onchange="updateField(${row.id}, 'notes', this.value)">
                    </div>
                `;
                container.innerHTML += html;
            });

            document.getElementById('runningTotal').textContent = '₹' + total.toLocaleString('en-IN', {maximumFractionDigits: 2});
        }

        function saveAllExpenses() {
            const valid = expenses.filter(r => r.project && r.date && r.particular && r.entity);
            if (!valid.length) {
                alert('Fill: Project, Date, Particular, Entity for each row');
                return;
            }
            localStorage.setItem('expenseData', JSON.stringify(expenses));
            document.getElementById('successMsg').innerHTML = '<div class="success">✓ Saved ' + valid.length + ' expense(s)!</div>';
            setTimeout(() => {
                expenses = [];
                rowCount = 0;
                document.getElementById('successMsg').innerHTML = '';
                renderRows();
            }, 2000);
        }

        function showExpenses() {
            const list = document.getElementById('expensesList');
            list.innerHTML = '';
            if (!expenses.length) {
                list.innerHTML = '<p style="text-align: center; color: #999;">No expenses saved</p>';
                return;
            }
            expenses.forEach(exp => {
                const total = (parseFloat(exp.qty) * parseFloat(exp.rate)) + ((parseFloat(exp.qty) * parseFloat(exp.rate) * parseFloat(exp.gst)) / 100);
                list.innerHTML += `
                    <div class="list-item">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${exp.particular}</strong>
                            <strong style="color: #22c55e;">₹${total.toLocaleString('en-IN')}</strong>
                        </div>
                        <p>${exp.project} | ${exp.date} | ${exp.entity}</p>
                    </div>
                `;
            });
        }

        // Initialize
        loadExpenses();
    </script>

</body>
</html>
